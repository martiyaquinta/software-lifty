# Local dev infrastructure. Port 5433/6380 on purpose: they never clash
# with a system Postgres/Redis on the default ports.
# Everything is wired by `bun run setup` — see README.
services:
  postgres:
    image: postgres:16
    container_name: lifty-dev-pg
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: lifty
      POSTGRES_PASSWORD: lifty
      POSTGRES_DB: lifty
    volumes:
      - lifty-pgdata:/var/lib/postgresql/data
      - ./scripts/dev-db-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifty"]
      interval: 2s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7-alpine
    container_name: lifty-dev-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  lifty-pgdata:
